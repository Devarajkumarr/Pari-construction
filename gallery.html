<!DOCTYPE html>
<html lang="en">
<head>

    <title>Our Works - Pari Roofing Works</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            <h2>PARI ROOFING WORKS</h2>
        </div>

        <ul class="nav-links">

        <h1 class="section-title">
            Our Complete Works

        <div class="gallery-grid">

    <img src="images/work3.jpeg" onclick="openPopup(3)">
    <img src="images/work5.jpeg" onclick="openPopup(4)">

    <img src="images/work7.jpeg" onclick="openPopup(6)">

<div id="popup" class="popup">

    <span class="close-btn"
          onclick="closePopup()">
        ✖
    </span>

    <span class="prev-btn"
          onclick="changeMedia(-1)">
        ❮
    </span>

    <img id="popup-img">

    <video id="popup-video"
           controls>
        <source id="popup-video-source"
                type="video/mp4">
    </video>

    <span class="next-btn"
          onclick="changeMedia(1)">
        ❯
    </span>

</div>
